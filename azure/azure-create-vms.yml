---
- name: Provision Azure VMs
  hosts: localhost

  vars:
    res_group: "RGDefaultDemo"
    location: "eastus"
    vm_name: "rhel-web"

  tasks:

    - name: Create Network Interfaces for the VMs
      azure.azcollection.azure_rm_networkinterface:
        resource_group: "{{ res_group }}"
        name: "nic-{{ item }}"
        location: "{{ location }}"
        security_group: "demo-nsg"
        subnet_name: "demo-subnet"
        virtual_network_name: "demo-vnet"
        ip_configurations:
          - name: "ipconfig{{ item }}"
            primary: yes
            public_ip_address_name: "vm-pip-{{ item }}"
            load_balancer_backend_address_pools:
              - name: "web-backend-pool"
                load_balancer: "web-lb"
      loop: [1, 2]

    - name: Create 2 CentOS 9 Stream in Availability Set
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ res_group }}"
        name: "{{ vm_name }}-{{ item }}"
        vm_size: Standard_B2s
        plan:
          publisher: procomputers
          product: centos-9-stream-gen2
          name: centos-9-stream-gen2
        image:
          publisher: procomputers
          offer: centos-9-stream-gen2
          sku: centos-9-stream-gen2
          version: latest
        accept_terms: true
        managed_disk_type: Standard_LRS
        admin_username: azureuser
        ssh_password_enabled: false
        ssh_public_keys:
          - path: /home/azureuser/.ssh/authorized_keys
            key_data: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICblhuyXns6590N9X8FrV0rCj9hiDc6SPXhCrKC+SCHw ansible-2022-01-29"
        network_interfaces: "nic-{{ item }}"
      loop: [1, 2]
